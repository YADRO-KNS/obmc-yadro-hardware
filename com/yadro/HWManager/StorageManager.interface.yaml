description: >
    The interface to control Yadro storage subsystem.

methods:
    - name: SetDriveLocationLED
      description: >
          Turn On/Off drive location LED.
      parameters:
          - name: DriveSN
            type: string
            description: >
                Serial number of the drive, corresponding to required LED
          - name: Assert
            type: boolean
            description: >
                Requested LED state
      returns:
          - name: Result
            type: boolean
            description: >
                True if succeed, False on error
      errors:
          - xyz.openbmc_project.Common.Error.InvalidArgument
          - xyz.openbmc_project.Common.Error.InternalFailure
